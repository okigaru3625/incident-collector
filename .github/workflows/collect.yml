name: 学校インシデント情報収集

on:
  schedule:
    # 毎日 09:00 JST（= 00:00 UTC）に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動実行も可能

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: インシデント情報を収集
        run: python collect_incidents.py

      - name: incidents.json をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add incidents.json
          git diff --cached --quiet || git commit -m "chore: インシデント情報を自動更新 $(date +'%Y-%m-%d')"
          git push
